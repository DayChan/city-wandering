name: CityWandering
options:
  bundleIdPrefix: com.jonaschen
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  createIntermediateGroups: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"

targets:
  CityWandering:
    type: application
    platform: iOS
    sources:
      - path: CityWandering/Sources
      - path: CityWandering/Resources
    resources:
      - path: CityWandering/Resources
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jonaschen.CityWandering
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: CityWandering/Resources/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
